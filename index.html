

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>TAG Memo</title>

<link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>

<style>
body {
  font-family: sans-serif;
  margin: 16px;
}

textarea,
input {
  width: 100%;
  box-sizing: border-box;
  margin: 4px 0 8px;
  padding: 8px;
}

button {
  padding: 8px 12px;
  margin: 4px 4px 12px 0;
}

#table {
  margin-top: 12px;
}
</style>
</head>

<body>

<h1>TAG Memo</h1>

<!-- 取り込み -->
<details>
  <summary>取込</summary>

  <input id="baseDate" placeholder="日付を入力">

  <textarea id="inputText" rows="8" placeholder="TAG.マクロ GetSheetProperty確認&#10;TAG.学習 2026/06/22 SAP基礎"></textarea>

  <button id="importBtn">追加取込</button>
  <button id="clearInputBtn">入力クリア</button>
</details>  

<!-- SON文字列取込 -->
<details>
  <summary>JSON文字列取込</summary>

<textarea
  id="jsonText"
  rows="8"
  placeholder='[{"tag":"TAG.テスト","date":"2026/06/21","content":"テスト"}]'></textarea>

<button id="importJsonTextBtn">JSON文字列取込</button>
<button id="clearJsonTextBtn">JSON文字列クリア</button>

</details>

<!-- JSON文字列出力 -->
<details>
  <summary>JSON文字列出力</summary>

<textarea
  id="jsonOutputText"
  rows="12"
  readonly></textarea>

<br>

<button id="exportJsonTextBtn">
  JSON文字列出力
</button>

<button id="copyJsonBtn">
  JSONコピー
</button>
</details> 

<!-- CSV入出力 -->
<details>
  <summary>CSV入出</summary>

<h2>CSV文字列</h2>

<textarea
  id="csvText"
  rows="10"></textarea>

<br>

<button id="exportCsvBtn">
  CSV書出
</button>

<button id="importCsvBtn">
  CSV読込
</button>

<button id="clearCsvTextBtn">CSV文字列クリア</button>

</details>

<!-- AutoTag設定 -->
<details>

  <summary>AutoTag設定</summary>

  <textarea
    id="autoTagText"
    rows="10"></textarea>

  <br>

  <button id="saveAutoTagBtn">
    AutoTag保存
  </button>

  <button id="loadAutoTagBtn">
    AutoTag読込
  </button>

  <button id="retagBtn">
    AutoTag再判定
  </button>

  <button id="clearAutoTagBtn">
    AutoTagクリア
  </button>

</details>


<h2>一覧</h2>
<div id="status"></div>
<div id="table"></div>
  <button id="deleteSelectedBtn">選択行削除</button>
  <button id="clearDataBtn">全削除</button>
  
    <br>
  <button id="exportBtn">JSON出力</button>

  <input
    type="file"
    id="importJsonFile"
    accept=".json">


<script src="app.js"></script>
<script>
  document
    .getElementById("exportBtn")
    .addEventListener("click", exportJson);

  document
    .getElementById("importJsonFile")
    .addEventListener("change", importJson);

  document
  .getElementById("deleteSelectedBtn")
  .addEventListener("click", deleteSelectedRows);

  document
  .getElementById("importJsonTextBtn")
  .addEventListener("click", importJsonText);

document
  .getElementById("clearJsonTextBtn")
  .addEventListener("click", () => {
    document.getElementById("jsonText").value = "";
  });

document
  .getElementById("exportJsonTextBtn")
  .addEventListener("click", exportJsonText);

document
  .getElementById("copyJsonBtn")
  .addEventListener("click", copyJsonText);

document
  .getElementById("exportCsvBtn")
  .addEventListener("click", exportCsvText);

document
  .getElementById("importCsvBtn")
  .addEventListener("click", importCsvText);

document
  .getElementById("saveAutoTagBtn")
  .addEventListener("click", saveAutoTag);

document
  .getElementById("loadAutoTagBtn")
  .addEventListener("click", loadAutoTagToText);

document
  .getElementById("clearAutoTagBtn")
  .addEventListener("click", clearAutoTag);

document
  .getElementById("retagBtn")
  .addEventListener(
    "click",
    recalculateAutoTags
  );

document
  .getElementById("clearCsvTextBtn")
  .addEventListener("click", clearCsvForm);

</script>

</body>
</html>
