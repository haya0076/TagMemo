

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>TAG Memo</title>

<link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>

<style>
body {
  font-family: sans-serif;
  margin: 16px;
}

textarea,
input {
  width: 100%;
  box-sizing: border-box;
  margin: 4px 0 8px;
  padding: 8px;
}

button {
  padding: 8px 12px;
  margin: 4px 4px 12px 0;
}

#table {
  margin-top: 12px;
}
</style>
</head>

<body>

<h1>TAG Memo</h1>

<!-- 取り込み -->
<details>
  <summary>取込</summary>

  <input id="baseDate" placeholder="日付を入力">

  <textarea id="inputText" rows="8" placeholder="TAG.マクロ GetSheetProperty確認&#10;TAG.学習 2026/06/22 SAP基礎"></textarea>

  <button id="importBtn">追加取込</button>
  <button id="clearInputBtn">入力クリア</button>
</details>

<!-- TSV入出力 -->
<details>
  <summary>TSV入出</summary>

<h2>TSV文字列</h2>

<textarea
  id="tsvText"
  rows="10"></textarea>

<br>

<button id="exportTsvBtn">
  TSV書出
</button>

<button id="importTsvBtn">
  TSV読込
</button>

<button id="clearTsvTextBtn">TSV文字列クリア</button>

</details>

<!-- AutoTag設定 -->
<details>

  <summary>AutoTag設定</summary>

  <textarea
    id="autoTagText"
    rows="10"></textarea>

  <br>

  <button id="saveAutoTagBtn">
    AutoTag保存
  </button>

  <button id="loadAutoTagBtn">
    AutoTag読込
  </button>

  <button id="retagBtn">
    AutoTag再判定
  </button>

  <button id="clearAutoTagBtn">
    AutoTagクリア
  </button>

</details>


<h2>一覧</h2>
<div id="status"></div>
  <button id="retagBtn">
    AutoTag再判定
  </button>
<div id="table"></div>
  <button id="deleteSelectedBtn">選択行削除</button>
  <button id="clearDataBtn">全削除</button>
  
    <br>
  <button id="exportBtn">JSON出力</button>

  <input
    type="file"
    id="importJsonFile"
    accept=".json">


<script src="app.js"></script>
<script>
  const bindIfExists = (id, eventName, handler) => {
    const element = document.getElementById(id);
    if (element) {
      element.addEventListener(eventName, handler);
    }
  };

  bindIfExists("exportBtn", "click", exportJson);
  bindIfExists("importJsonFile", "change", importJson);
  bindIfExists("deleteSelectedBtn", "click", deleteSelectedRows);

  bindIfExists("importJsonTextBtn", "click", importJsonText);
  bindIfExists("clearJsonTextBtn", "click", () => {
    const jsonText = document.getElementById("jsonText");
    if (jsonText) {
      jsonText.value = "";
    }
  });
  bindIfExists("exportJsonTextBtn", "click", exportJsonText);
  bindIfExists("copyJsonBtn", "click", copyJsonText);

  bindIfExists("exportTsvBtn", "click", exportTsvText);

document
  .getElementById("importTsvBtn")
  .addEventListener("click", importTsvText);

document
  .getElementById("saveAutoTagBtn")
  .addEventListener("click", saveAutoTag);

document
  .getElementById("loadAutoTagBtn")
  .addEventListener("click", loadAutoTagToText);

document
  .getElementById("clearAutoTagBtn")
  .addEventListener("click", clearAutoTag);

document
  .getElementById("retagBtn")
  .addEventListener(
    "click",
    recalculateAutoTags
  );

document
  .getElementById("clearTsvTextBtn")
  .addEventListener("click", clearTsvForm);

</script>

</body>
