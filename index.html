

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>TAG Memo</title>

<link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>

<style>
body {
  font-family: sans-serif;
  margin: 16px;
}

textarea,
input {
  width: 100%;
  box-sizing: border-box;
  margin: 4px 0 8px;
  padding: 8px;
}

button {
  padding: 8px 12px;
  margin: 4px 4px 12px 0;
}

#table {
  margin-top: 12px;
}
</style>
</head>

<body>

<h1>TAG Memo</h1>

<h2>取込</h2>

<input id="baseDate" placeholder="基準日 2026/06/21">

<textarea id="inputText" rows="8" placeholder="TAG.マクロ GetSheetProperty確認&#10;TAG.学習 2026/06/22 SAP基礎"></textarea>

<button id="importBtn">追加取込</button>
<button id="clearInputBtn">入力クリア</button>
<button id="clearDataBtn">全削除</button>

<div id="status"></div>

<h2>一覧</h2>
<div id="table"></div>

<script src="app.js"></script>
</body>
</html>
